# ─────────────────────────────────────────────────────────────
# Auto-deploy → GitHub Pages
# push เข้า branch main เมื่อไหร่ → build + deploy ขึ้นเว็บอัตโนมัติ
#
# ครั้งแรกต้องตั้งค่าใน GitHub repo:
#   Settings → Pages → Build and deployment → Source = "GitHub Actions"
#   Settings → Secrets and variables → Actions → New repository secret:
#       Name  = VITE_SHEET_API_URL
#       Value = <URL Apps Script Web App ของคุณ ลงท้าย /exec>
# ─────────────────────────────────────────────────────────────
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SHEET_API_URL: ${{ secrets.VITE_SHEET_API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
